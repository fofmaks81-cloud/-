<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Стоматологические СОПы - Протоколы лечения</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-title">Стоматологические СОПы</div>
          <div class="brand-subtitle">Протоколы лечения</div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Стандартные операционные процедуры</h1>
        <p>
          Выберите раздел и протокол: содержимое протокола подставляется интерактивно.
        </p>
      </section>

      <section class="panel">
        <details id="ortopediaSection" class="details" open>
          <summary class="details-summary" role="button" aria-controls="ortopediaPanel">
            Ортопедия
          </summary>

          <div id="ortopediaPanel" class="details-body">
            <div class="row">
              <label for="ortopediaProtocolSearch" class="label">Поиск:</label>
              <input
                id="ortopediaProtocolSearch"
                class="input"
                type="search"
                placeholder="Начните вводить название протокола..."
                autocomplete="off"
              />
            </div>

            <div class="row">
              <label for="ortopediaProtocolSelect" class="label">Протокол:</label>
              <select id="ortopediaProtocolSelect" class="select">
                <option value="">Выберите протокол</option>
              </select>

              <a
                id="ortopediaOpenLink"
                class="btn btn-secondary"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                aria-disabled="true"
              >
                Открыть
              </a>
            </div>

            <div id="ortopediaProtocolContent" class="protocol-content" aria-live="polite">
              <p id="ortopediaProtocolHint" class="muted">Выберите протокол, чтобы увидеть его текст.</p>
              <iframe
                id="ortopediaProtocolFrame"
                class="protocol-frame"
                title="Протокол"
                loading="lazy"
                referrerpolicy="no-referrer"
              ></iframe>
            </div>
          </div>
        </details>
      </section>
